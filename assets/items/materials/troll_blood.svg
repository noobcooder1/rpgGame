<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="troll_blood material icon">
  <defs>
    
    <filter id="drop_troll_blood" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="20" stdDeviation="14" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="grain_troll_blood" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="193" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.11"/>
      </feComponentTransfer>
    </filter>
    <filter id="surface_troll_blood" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="2" seed="210" result="surfaceNoise"/>
      <feDisplacementMap in="SourceGraphic" in2="surfaceNoise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="rim_troll_blood" cx="0.35" cy="0.2" r="0.9">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </radialGradient>
    
    <linearGradient id="glass_troll_blood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9f6ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="liquid_troll_blood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d73f45" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#8f1e27" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#420b10" stop-opacity="0.98"/>
    </linearGradient>
  </defs>
  <ellipse cx="256" cy="458" rx="146" ry="28" fill="#000000" opacity="0.28"/>
  
  <g filter="url(#drop_troll_blood)">
    <rect x="212" y="78" width="88" height="62" rx="16" fill="#7c5634"/>
    <path d="M188 130H324L370 206V366C370 406 338 438 298 438H214C174 438 142 406 142 366V206Z" fill="url(#glass_troll_blood)" stroke="#b0bac4" stroke-opacity="0.58" stroke-width="8"/>
    <path d="M152 290H360V372C360 404 334 430 302 430H210C178 430 152 404 152 372Z" fill="url(#liquid_troll_blood)"/>
    <path d="M170 176C198 164 244 160 320 170" stroke="#ffffff" stroke-opacity="0.42" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M182 302C226 312 276 312 330 302" stroke="#ffffff" stroke-opacity="0.24" stroke-width="6" stroke-linecap="round" fill="none"/>
  </g>
  <rect x="24" y="24" width="464" height="464" filter="url(#grain_troll_blood)"/>
