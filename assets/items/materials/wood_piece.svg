<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="wood_piece material icon">
  <defs>
    
    <filter id="drop_wood_piece" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="20" stdDeviation="14" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="grain_wood_piece" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="131" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.11"/>
      </feComponentTransfer>
    </filter>
    <filter id="surface_wood_piece" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="2" seed="148" result="surfaceNoise"/>
      <feDisplacementMap in="SourceGraphic" in2="surfaceNoise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="rim_wood_piece" cx="0.35" cy="0.2" r="0.9">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </radialGradient>
    
    <linearGradient id="wood_wood_piece" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ba7d4e"/>
      <stop offset="55%" stop-color="#8c5632"/>
      <stop offset="100%" stop-color="#5f381f"/>
    </linearGradient>
    <radialGradient id="ring_wood_piece" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#8f633e"/>
      <stop offset="100%" stop-color="#5a371f"/>
    </radialGradient>
  </defs>
  <ellipse cx="256" cy="458" rx="146" ry="28" fill="#000000" opacity="0.28"/>
  
  <g filter="url(#drop_wood_piece)" transform="rotate(-8 256 256)">
