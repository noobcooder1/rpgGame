<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="grass material icon">
  <defs>
    
    <filter id="drop_grass" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="20" stdDeviation="14" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="grain_grass" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="105" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.11"/>
      </feComponentTransfer>
    </filter>
    <filter id="surface_grass" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="2" seed="122" result="surfaceNoise"/>
      <feDisplacementMap in="SourceGraphic" in2="surfaceNoise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="rim_grass" cx="0.35" cy="0.2" r="0.9">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </radialGradient>
    
    <linearGradient id="leafA_grass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a9cf70"/>
      <stop offset="100%" stop-color="#6ca44f"/>
    </linearGradient>
    <linearGradient id="leafB_grass" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a9cf70"/>
      <stop offset="100%" stop-color="#406736"/>
    </linearGradient>
    <linearGradient id="leafC_grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ca44f"/>
      <stop offset="100%" stop-color="#406736"/>
    </linearGradient>
    <linearGradient id="stem_grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7f5b3d"/>
      <stop offset="100%" stop-color="#3e2717"/>
    </linearGradient>
  </defs>
  <ellipse cx="256" cy="458" rx="146" ry="28" fill="#000000" opacity="0.28"/>
  
