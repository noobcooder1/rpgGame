<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="rotten_flesh material icon">
  <defs>
    
    <filter id="drop_rotten_flesh" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="20" stdDeviation="14" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="grain_rotten_flesh" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="181" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.11"/>
      </feComponentTransfer>
    </filter>
    <filter id="surface_rotten_flesh" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="2" seed="198" result="surfaceNoise"/>
      <feDisplacementMap in="SourceGraphic" in2="surfaceNoise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="rim_rotten_flesh" cx="0.35" cy="0.2" r="0.9">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </radialGradient>
    
    <radialGradient id="flesh_rotten_flesh" cx="0.35" cy="0.2" r="0.8">
      <stop offset="0%" stop-color="#c36d67"/>
      <stop offset="55%" stop-color="#844341"/>
      <stop offset="100%" stop-color="#492829"/>
    </radialGradient>
  </defs>
  <ellipse cx="256" cy="458" rx="146" ry="28" fill="#000000" opacity="0.28"/>
  
  <g filter="url(#drop_rotten_flesh)">
    <path d="M114 370C74 316 78 242 122 192C174 132 252 98 328 110C388 118 432 154 440 214C448 282 404 330 370 370C326 422 246 458 186 442C150 430 132 402 114 370Z" fill="url(#flesh_rotten_flesh)" stroke="#3b1717" stroke-opacity="0.62" stroke-width="8"/>
    <path d="M170 188C224 206 270 236 314 276M202 366C246 352 292 344 356 348" stroke="#ffffff" stroke-opacity="0.2" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M144 324C188 286 238 258 298 242" stroke="#000000" stroke-opacity="0.22" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>
  <rect x="24" y="24" width="464" height="464" filter="url(#grain_rotten_flesh)"/>
